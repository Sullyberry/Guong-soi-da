    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Georgia, 'Times New Roman', serif;
        background: radial-gradient(circle at 50% 25%, #FCFAF7 0%, #F2E7E1 100%);
        color: #241C1B;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 480px;
        width: 100%;
      }
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        margin-bottom: 40px;
      }
      .brand-logo {
        height: 56px;
        width: auto;
        object-fit: contain;
      }
      .brand-divider {
        width: 40px;
        height: 1px;
        background: rgba(160, 98, 76, 0.35);
      }
      /* khối 404 + tiêu đề gộp thành một đơn vị */
      .hero {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .code {
        font-size: clamp(96px, 22vw, 168px);
        font-weight: 300;
        line-height: 0.9;
        color: #241C1B;
        letter-spacing: -0.05em;
      }
      .code span { color: rgba(160, 98, 76, 0.28); }
      .title {
        font-family: 'Times New Roman', Times, serif;
        font-size: clamp(22px, 5vw, 30px);
        font-weight: 400;
        margin-top: 8px;
        color: #241C1B;
      }
      .desc {
        font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
        font-size: 15px;
        color: rgba(36, 28, 27, 0.55);
        max-width: 400px;
        line-height: 1.7;
        margin: 22px auto 38px;
      }
      .btn {
        display: inline-block;
        background: #241C1B;
        color: #FCFAF7;
        text-decoration: none;
        font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 16px 36px;
        border-radius: 999px;
        transition: background 0.2s, transform 0.2s;
      }
      .btn:hover { background: #A0624C; transform: translateY(-2px); }
      .links {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid rgba(160, 98, 76, 0.18);
        width: 100%;
        max-width: 320px;
        font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
        font-size: 13px;
      }
      .links a {
        color: #A0624C;
        text-decoration: none;
        margin: 0 14px;
        transition: opacity 0.2s;
      }
      .links a:hover { opacity: 0.65; }
